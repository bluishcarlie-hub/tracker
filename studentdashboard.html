<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OJT System - Student Dashboard</title>
<link rel="stylesheet" href="style.css">
<style>
.burger-menu {
  position: fixed;
  top: 20px;
  right: 20px;
  cursor: pointer;
  z-index: 1001;
}

.burger-menu div {
  width: 25px;
  height: 3px;
  background-color: white;
  margin: 5px 0;
  transition: 0.3s;
}

.burger-menu.open div:nth-child(1) {
  transform: rotate(-45deg) translate(-5px, 6px);
}

.burger-menu.open div:nth-child(2) {
  opacity: 0;
}

.burger-menu.open div:nth-child(3) {
  transform: rotate(45deg) translate(-5px, -6px);
}

.sidebar {
  position: fixed;
  top: 0;
  right: -300px;
  width: 250px;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.9);
  backdrop-filter: blur(10px);
  transition: right 0.3s ease;
  z-index: 1000;
  padding: 20px;
  box-sizing: border-box;
}

.sidebar.open {
  right: 0;
}

.sidebar button {
  width: 100%;
  margin: 10px 0;
}

.sidebar h3 {
  color: white;
  margin-bottom: 20px;
  text-align: center;
}
</style>
</head>
<body>
<header>
<h1>OJT Tracking System</h1>
<div class="burger-menu" onclick="toggleSidebar()">
  <div></div>
  <div></div>
  <div></div>
</div>
</header>

<div class="container">

<div id="dashboard" class="card">
<!-- Student Profile Section -->
<div id="studentProfile" style="display: none; align-items: center; margin-bottom: 25px; padding: 25px; background: rgba(59, 130, 246, 0.12); border-radius: 15px; border: 2px solid rgba(59, 130, 246, 0.3);">
  <img id="profilePic" style="width: 80px; height: 80px; border-radius: 50%; margin-right: 25px; border: 4px solid #3b82f6; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); object-fit: cover;">
  <div style="flex: 1;">
    <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap; margin-bottom: 12px;">
      <h2 id="studentName" style="margin: 0; color: white; font-size: 28px; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.3);"></h2>
      <span id="studentNumberBadge" style="display:none; background: rgba(255,255,255,0.12); padding: 8px 14px; border-radius: 999px; color: #dbeafe; font-size: 14px; border: 1px solid rgba(255,255,255,0.18);"></span>
    </div>
    <div id="studentDetails" style="display: flex; flex-wrap: wrap; gap: 15px; margin: 0;"></div>
  </div>
</div>

<h3>Progress</h3>
<div class="progress"><div id="bar" class="progress-bar"></div></div>
<p><span id="total">0</span> / 500 hours</p>

<h3>Add Log</h3>
<input type="date" id="date">
<input type="text" id="task" placeholder="Task">
<input type="number" id="hours" placeholder="Hours">
<input type="file" id="image">
<button onclick="addLog()">Add</button>
<button onclick="exportPDF()">Export PDF</button>

<table>
<thead>
<tr><th>Date</th><th>Task</th><th>Hours</th><th>Proof</th><th>Status</th><th>Action</th></tr>
</thead>
<tbody id="logs"></tbody>
</table>
</div>

</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
<h3>Menu</h3>
<button onclick="logout()">Logout</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="script.js"></script>
<script>
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const burger = document.querySelector('.burger-menu');
  sidebar.classList.toggle('open');
  overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
  burger.classList.toggle('open');
}

function closeSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const burger = document.querySelector('.burger-menu');
  sidebar.classList.remove('open');
  overlay.style.display = 'none';
  burger.classList.remove('open');
}
</script>
</body>
</html>
