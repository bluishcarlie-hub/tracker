<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OJT System - Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
<style>
.burger-menu {
  position: fixed;
  top: 20px;
  right: 20px;
  cursor: pointer;
  z-index: 1001;
}

.burger-menu div {
  width: 25px;
  height: 3px;
  background-color: white;
  margin: 5px 0;
  transition: 0.3s;
}

.burger-menu.open div:nth-child(1) {
  transform: rotate(-45deg) translate(-5px, 6px);
}

.burger-menu.open div:nth-child(2) {
  opacity: 0;
}

.burger-menu.open div:nth-child(3) {
  transform: rotate(45deg) translate(-5px, -6px);
}

.sidebar {
  position: fixed;
  top: 0;
  right: -300px;
  width: 250px;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.9);
  backdrop-filter: blur(10px);
  transition: right 0.3s ease;
  z-index: 1000;
  padding: 20px;
  box-sizing: border-box;
}

.sidebar.open {
  right: 0;
}

.sidebar button {
  width: 100%;
  margin: 10px 0;
}

.sidebar a {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  background: #3b82f6;
  color: white;
  text-decoration: none;
  text-align: center;
  border-radius: 8px;
  cursor: pointer;
}

.sidebar h3 {
  color: white;
  margin-bottom: 20px;
  text-align: center;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.5);
  display: none;
  z-index: 999;
}
</style>
</head>
<body>
<header>
<h1>OJT Tracking System - Admin</h1>
<div class="burger-menu" onclick="toggleSidebar()">
  <div></div>
  <div></div>
  <div></div>
</div>
</header>

<div class="container">

<div id="dashboard" class="card">
<h2 id="role"></h2>
<img id="profilePic" style="width:50px; height:50px; border-radius:50%; display:none;">

<h3>Dashboard Overview</h3>
<div class="card" style="background: rgba(255,255,255,0.05); padding:15px; margin:10px 0;">
  <p><strong>Total Approved Students:</strong> <span id="totalStudents">0</span></p>
  <p><strong>Pending Registrations:</strong> <span id="pendingCount">0</span></p>
</div>

<h3>Approved Students</h3>
<table>
<thead>
<tr><th>Name</th><th>Student ID</th><th>Email</th><th>Location</th><th>Action</th></tr>
</thead>
<tbody id="approvedStudents"></tbody>
</table>

</div>

</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
<h3>Menu</h3>
<a href="admindashboard.html" style="background: #2563eb;">Dashboard</a>
<a href="loginapprove.html">Approve Registrations</a>
<a href="taskapprove.html">Student Monitoring</a>
<button onclick="logout()">Logout</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="script.js"></script>
<script>
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const burger = document.querySelector('.burger-menu');
  sidebar.classList.toggle('open');
  overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
  burger.classList.toggle('open');
}

function closeSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const burger = document.querySelector('.burger-menu');
  sidebar.classList.remove('open');
  overlay.style.display = 'none';
  burger.classList.remove('open');
}

window.onload = function(){
  if(!currentUser || currentUser.role !== 'admin'){
    window.location.href = 'login.html';
  }
  showDashboard();
  updateAdminOverview();
  renderApprovedStudents();
  renderLogs();
}

function updateAdminOverview(){
  let approvedStudents = users.filter(u=>u.role==='student' && u.approved).length;
  let pendingStudents = users.filter(u=>u.role==='student' && !u.approved).length;
  
  document.getElementById('totalStudents').innerText = approvedStudents;
  document.getElementById('pendingCount').innerText = pendingStudents;
}
</script>
</body>
</html>
