<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OJT System - Approve Registrations</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=">
<style>
.burger-menu {
  position: fixed;
  top: 20px;
  right: 20px;
  cursor: pointer;
  z-index: 1001;
}

.burger-menu div {
  width: 25px;
  height: 3px;
  background-color: white;
  margin: 5px 0;
  transition: 0.3s;
}

.burger-menu.open div:nth-child(1) {
  transform: rotate(-45deg) translate(-5px, 6px);
}

.burger-menu.open div:nth-child(2) {
  opacity: 0;
}

.burger-menu.open div:nth-child(3) {
  transform: rotate(45deg) translate(-5px, -6px);
}

.sidebar {
  position: fixed;
  top: 0;
  right: -300px;
  width: 250px;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.9);
  backdrop-filter: blur(10px);
  transition: right 0.3s ease;
  z-index: 1000;
  padding: 20px;
  box-sizing: border-box;
}

.sidebar.open {
  right: 0;
}

.sidebar button, .sidebar a {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  background: #3b82f6;
  color: white;
  text-decoration: none;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  text-align: center;
}

.sidebar a {
  display: block;
}

.sidebar h3 {
  color: white;
  margin-bottom: 20px;
  text-align: center;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.5);
  display: none;
  z-index: 999;
}

table img {
  max-width: 100px;
  border-radius: 5px;
}
</style>
</head>
<body>
<header>
<h1>Approve User Registrations</h1>
<div class="burger-menu" onclick="toggleSidebar()">
  <div></div>
  <div></div>
  <div></div>
</div>
</header>

<div class="container">
<div id="dashboard" class="card">
<table id="pendingUsers">
<thead>
<tr><th>Student Number</th><th>Name</th><th>Email</th><th>Picture</th><th>Registration Date</th><th>Action</th></tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
<h3>Menu</h3>
<a href="admindashboard.html">Dashboard</a>
<a href="taskapprove.html">Student Monitoring</a>
<button onclick="logout()">Logout</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="script.js"></script>
<script>
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const burger = document.querySelector('.burger-menu');
  sidebar.classList.toggle('open');
  overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
  burger.classList.toggle('open');
}

function closeSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const burger = document.querySelector('.burger-menu');
  sidebar.classList.remove('open');
  overlay.style.display = 'none';
  burger.classList.remove('open');
}

window.onload = async function(){
  if(!currentUser || currentUser.role !== 'admin'){
    window.location.href = 'login.html';
  }
  await renderPendingUsers();
}
</script>
</body>
</html>
