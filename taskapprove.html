<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OJT System - Student Location Monitoring</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR4nGNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=">
<style>
.burger-menu {
  position: fixed;
  top: 20px;
  right: 20px;
  cursor: pointer;
  z-index: 1001;
}

.burger-menu div {
  width: 25px;
  height: 3px;
  background-color: white;
  margin: 5px 0;
  transition: 0.3s;
}

.burger-menu.open div:nth-child(1) {
  transform: rotate(-45deg) translate(-5px, 6px);
}

.burger-menu.open div:nth-child(2) {
  opacity: 0;
}

.burger-menu.open div:nth-child(3) {
  transform: rotate(45deg) translate(-5px, -6px);
}

.sidebar {
  position: fixed;
  top: 0;
  right: -300px;
  width: 250px;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.9);
  backdrop-filter: blur(10px);
  transition: right 0.3s ease;
  z-index: 1000;
  padding: 20px;
  box-sizing: border-box;
}

.sidebar.open {
  right: 0;
}

.sidebar button, .sidebar a {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  background: #3b82f6;
  color: white;
  text-decoration: none;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  text-align: center;
}

.sidebar a {
  display: block;
}

.sidebar h3 {
  color: white;
  margin-bottom: 20px;
  text-align: center;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.5);
  display: none;
  z-index: 999;
}

table img {
  max-width: 100px;
  border-radius: 5px;
}
</style>
</head>
<body>
<header>
<h1>Student Location Monitoring</h1>
<div class="burger-menu" onclick="toggleSidebar()">
  <div></div>
  <div></div>
  <div></div>
</div>
</header>

<div class="container">
<div id="dashboard" class="card">
<div style="margin-bottom: 20px;">
  <label for="filterLocation">Filter by Location:</label>
  <select id="filterLocation" onchange="renderLocationMonitoring()" style="margin-left: 10px; padding: 8px; border-radius: 8px; border: none;">
    <option value="">All Locations</option>
    <option value="DOST">DOST</option>
    <option value="DICT">DICT</option>
    <option value="Cathedral">Cathedral</option>
    <option value="DAR">DAR</option>
    <option value="NetCamp">NetCamp</option>
    <option value="SeekMarketing">SeekMarketing</option>
    <option value="ESSU">ESSU</option>
  </select>
  <button id="toggleProfile" onclick="toggleProfileView()" style="margin-left: 20px; padding: 8px 16px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer;">See Profiles</button>
</div>
<table id="locationTable">
<thead id="tableHeader">
<tr><th>Student Name</th><th>Student ID</th><th>Location</th><th>Status</th><th>Last Active</th></tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
<h3>Menu</h3>
<a href="admindashboard.html">Dashboard</a>
<a href="loginapprove.html">Approve Registrations</a>
<a href="taskapprove.html" style="background: #2563eb;">Student Monitoring</a>
<button onclick="logout()">Logout</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="script.js"></script>
<script>
window.profileView = false;

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const burger = document.querySelector('.burger-menu');
  sidebar.classList.toggle('open');
  overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
  burger.classList.toggle('open');
}

function closeSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const burger = document.querySelector('.burger-menu');
  sidebar.classList.remove('open');
  overlay.style.display = 'none';
  burger.classList.remove('open');
}

function toggleProfileView() {
  window.profileView = !window.profileView;
  const button = document.getElementById('toggleProfile');
  button.innerText = window.profileView ? 'See Monitoring' : 'See Profiles';
  renderLocationMonitoring();
}

window.onload = async function(){
  if(!currentUser || currentUser.role !== 'admin'){
    window.location.href = 'login.html';
  }
  await renderLocationMonitoring();
  setInterval(renderLocationMonitoring, 5000);
}
</script>
</body>
</html>
